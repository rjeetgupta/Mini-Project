<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <nav id="nav-bar">
        <div class="home">Home</div>

        <div class="search-container">
            <form action="">
                <input id="city" type="text" placeholder="Enter your city">
                <button id="submitBtn" type="submit">Search</button>
            </form>
        </div>
    </nav>


    <div class="weather-container">
        <div class="location">
            <h2 class="cityName">City Name</h2>
        </div>
        <div class="current-weather">

            <div class="imgDescription">
                <img src="" alt="image">
                <div class="description">Partly Cloudy</div>
            </div>

            <div class="temperature">21.0 °C</div>

            <div class="details">
                <span class="windSpeed">6.1 km/h</span>
                <span class="humidity"> 0.00 mm</span>
                <span class="pressure">1025.0 mb</span>
            </div>
        </div>

        <div class="forecaste-details">

            <div class="forecast second">
                <div class="day">TUE</div>
                <img id="secondImg" src="" alt="image">
                <div class="high-low">
                    <div class="high">23.3°C</div>
                    <div class="low">10.2°C</div>
                </div>
            </div>

            <div class="forecast third">
                <div class="day">TUE</div>
                <img src="" alt="image">
                <div class="high-low">
                    <div class="high">23.3°C</div>
                    <div class="low">10.2°C</div>
                </div>
            </div>


            <div class="forecast fourth">
                <div class="day">WED</div>
                <img src="" alt="image">
                <div class="high-low">
                    <div class="high">23.3°C</div>
                    <div class="low">10.2°C</div>
                </div>
            </div>


            <div class="forecast fifth">
                <div class="day">THU</div>
                <img src="" alt="image">
                <div class="high-low">
                    <div class="high">23.3°C</div>
                    <div class="low">10.2°C</div>
                </div>
            </div>


            <div class="forecast sixth">
                <div class="day">FRI</div>
                <img src="" alt="image">
                <div class="high-low">
                    <div class="high">23.3°C</div>
                    <div class="low">10.2°C</div>
                </div>
            </div>


        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
